<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockVision — 로그인 / 가입신청</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #080c18;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area img {
      height: 44px;
      background: rgba(255,255,255,0.95);
      border-radius: 10px;
      padding: 6px 16px;
    }
    .logo-area .subtitle {
      margin-top: 10px;
      font-size: 13px;
      color: #64748b;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .card {
      background: #0f1629;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .tab-btn {
      flex: 1;
      padding: 16px;
      background: none;
      border: none;
      color: #64748b;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .tab-btn.active {
      color: #00d4ff;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
    }

    .tab-content { display: none; padding: 32px; }
    .tab-content.active { display: block; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #1a2035;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #00d4ff;
    }
    .form-group input::placeholder { color: #475569; }
    .form-group .hint {
      margin-top: 6px;
      font-size: 11px;
      color: #475569;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .alert.show { display: block; }
    .alert.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .alert.info { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); color: #7dd3fc; }

    .input-error { border-color: #ef4444 !important; }
    .field-error { color: #f87171; font-size: 11px; margin-top: 4px; }

    .admin-link {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #475569;
    }
    .admin-link a { color: #64748b; text-decoration: none; }
    .admin-link a:hover { color: #94a3b8; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo-area">
    <img src="logo.png" alt="Simplio" onerror="this.style.display='none'" />
    <div class="subtitle">Stock Dashboard</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" onclick="switchTab('signup')">가입신청</button>
    </div>

    <!-- 로그인 탭 -->
    <div class="tab-content active" id="tab-login">
      <div class="alert" id="login-alert"></div>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="login-email" placeholder="example@email.com" required />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="login-password" placeholder="비밀번호 입력" required />
        </div>
        <button type="submit" class="btn-submit" id="login-btn">로그인</button>
      </form>
    </div>

    <!-- 가입신청 탭 -->
    <div class="tab-content" id="tab-signup">
      <div class="alert" id="signup-alert"></div>
      <form onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="signup-email" placeholder="example@email.com" required />
        </div>
        <div class="form-group">
          <label>전화번호</label>
          <input type="tel" id="signup-phone" placeholder="01012345678" maxlength="11" required />
          <div class="hint">010으로 시작하는 11자리 숫자 (하이픈 없이)</div>
          <div class="field-error" id="phone-error"></div>
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="signup-password" placeholder="6자 이상 입력" minlength="6" required />
        </div>
        <button type="submit" class="btn-submit" id="signup-btn">가입신청</button>
      </form>
    </div>
  </div>

  <div class="admin-link">
    <a href="admin.html">관리자 페이지</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ywofxncimmukmjldcyuk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3b2Z4bmNpbW11a21qbGRjeXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjU3ODUsImV4cCI6MjA5MTc0MTc4NX0.3IRKsospjDtow4bDcafxfuk1_xi7MYgD29pr26DkTQg';

  // 이미 로그인된 경우 대시보드로 이동
  if (localStorage.getItem('sv_user')) {
    window.location.href = 'index.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  }

  function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `alert ${type} show`;
    el.textContent = msg;
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim().toLowerCase();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');

    btn.disabled = true;
    btn.textContent = '로그인 중...';

    try {
      const password_hash = await sha256(password);
      const res = await fetch(`${SUPABASE_URL}/functions/v1/verify-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
        body: JSON.stringify({ email, password_hash })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('sv_user', JSON.stringify({ email: data.user.email, phone: data.user.phone }));
        showAlert('login-alert', 'success', '로그인 성공! 대시보드로 이동합니다...');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } else {
        showAlert('login-alert', 'error', data.message);
      }
    } catch (err) {
      showAlert('login-alert', 'error', '네트워크 오류가 발생했습니다. 다시 시도해주세요.');
    } finally {
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    const email = document.getElementById('signup-email').value.trim().toLowerCase();
    const phone = document.getElementById('signup-phone').value.trim();
    const password = document.getElementById('signup-password').value;
    const btn = document.getElementById('signup-btn');

    // 전화번호 유효성 검사
    const phoneError = document.getElementById('phone-error');
    const phoneInput = document.getElementById('signup-phone');
    if (!/^010\d{8}$/.test(phone)) {
      phoneInput.classList.add('input-error');
      phoneError.textContent = '010으로 시작하는 11자리 숫자를 입력해주세요.';
      return;
    }
    phoneInput.classList.remove('input-error');
    phoneError.textContent = '';

    btn.disabled = true;
    btn.textContent = '신청 중...';

    try {
      const password_hash = await sha256(password);
      const res = await fetch(`${SUPABASE_URL}/rest/v1/signup_requests`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ email, phone, password_hash })
      });

      if (res.status === 201 || res.status === 200) {
        showAlert('signup-alert', 'success', '가입신청이 완료되었습니다! 관리자 승인 후 로그인하실 수 있습니다.');
        e.target.reset();
      } else {
        const err = await res.json();
        if (err.code === '23505') {
          showAlert('signup-alert', 'error', '이미 등록된 이메일입니다.');
        } else {
          showAlert('signup-alert', 'error', '신청 중 오류가 발생했습니다. 다시 시도해주세요.');
        }
      }
    } catch (err) {
      showAlert('signup-alert', 'error', '네트워크 오류가 발생했습니다. 다시 시도해주세요.');
    } finally {
      btn.disabled = false;
      btn.textContent = '가입신청';
    }
  }
</script>
</body>
</html>
