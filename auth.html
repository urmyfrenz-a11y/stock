<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockVision — 로그인</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080c18;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e6f0;
    }

    .card {
      background: #0f1524;
      border: 1px solid #1e2a3d;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .logo p {
      font-size: 12px;
      color: #5a6a8a;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #1e2a3d;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      color: #5a6a8a;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .tab.active {
      color: #00d4ff;
      border-bottom-color: #00d4ff;
    }

    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #8a9bb8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #141c2e;
      border: 1px solid #1e2a3d;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      color: #e0e6f0;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #00d4ff; }
    input::placeholder { color: #3a4a66; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      color: #fff;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    .msg.success { background: rgba(0,212,130,0.12); color: #00d482; display: block; }
    .msg.error   { background: rgba(255,70,70,0.12);  color: #ff6b6b;  display: block; }
    .msg.info    { background: rgba(0,212,255,0.1);   color: #00d4ff;  display: block; }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>StockVision</h1>
      <p>실시간 글로벌 주식 지수 대시보드</p>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">가입 신청</div>
    </div>

    <!-- 로그인 폼 -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-pw" placeholder="비밀번호 입력" />
      </div>
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">로그인</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <!-- 가입 신청 폼 -->
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="signup-email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label>전화번호 (010으로 시작하는 8자리)</label>
        <input type="tel" id="signup-phone" placeholder="01012345678" maxlength="11" />
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="signup-pw" placeholder="비밀번호 입력 (8자 이상)" />
      </div>
      <button class="btn btn-primary" id="signup-btn" onclick="doSignup()">가입 신청</button>
      <div class="msg" id="signup-msg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
